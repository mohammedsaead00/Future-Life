version: '3.8'

services:
  api:
    build:
      context: ./FutureLife.API
      dockerfile: Dockerfile
    container_name: futurelife_api
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=FutureLifeDb;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True;
      - Jwt__Key=YOUR_SUPER_SECRET_KEY_MIN_32_CHARS_HERE!!
      - Jwt__Issuer=FutureLife.API
      - Jwt__Audience=FutureLife.Client
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - futurelife_net
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: futurelife_sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrongPassword123!
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourStrongPassword123!", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - futurelife_net
    restart: unless-stopped

volumes:
  sqlserver_data:

networks:
  futurelife_net:
    driver: bridge
